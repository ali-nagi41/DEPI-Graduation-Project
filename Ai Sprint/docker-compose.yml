version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: ai_sprint_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: always

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: ai_sprint_server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/ai-sprint
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - mongodb
    restart: always

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: ai_sprint_client
    ports:
      - "80:80"
    depends_on:
      - server
    restart: always

volumes:
  mongodb_data:
